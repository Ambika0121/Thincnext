<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            /* Smooth Shake */
            @keyframes shake {
                0%, 100% { transform: translate(0, 0) rotate(0deg); }
                25% { transform: translate(1px, -1px) rotate(1deg); }
                50% { transform: translate(-2px, 2px) rotate(-1deg); }
                75% { transform: translate(2px, 2px) rotate(1deg); }
            }
            --animate-shake: shake 0.15s;

            /* Fixed Shine - Smooth Sweep */
            @keyframes shine {
                0% { transform: translateX(-150%) skewX(-200deg); }
                100% { transform: translateX(350%) skewX(-400deg); }
            }
            --animate-shine: shine 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;

            /* Multi-color Morphing */
            @keyframes colorFlow {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
            --animate-color-flow: colorFlow 6s ease infinite;
        }
    </style>
</head>

<body class="text-slate-900">

    <section id="hero">

        <header
            class="flex justify-between items-center px-6 py-4 md:px-12 bg-gray-700/10 backdrop-blur-xl border border-white/20 shadow-2xl rounded-3xl max-w-[1200px] mx-auto mt-6 relative overflow-hidden">

            <!-- Shine -->
            <div class="absolute inset-0 pointer-events-none">
                <div
                    class="absolute inset-0 w-1/4 h-full bg-gradient-to-r from-transparent via-white/30 to-transparent animate-shine">
                </div>
            </div>

            <!-- Logo -->
            <div class="group flex flex-col items-start cursor-pointer relative">

                <div class="flex items-baseline text-2xl font-black tracking-tighter">
                    <span
                        class="text-blue-500 transition-colors duration-200 group-hover:text-blue-500 group-hover:animate-shake"
                        style="animation-delay: 0.0s">t</span>
                    <span
                        class="text-blue-500 transition-colors duration-200 group-hover:text-pink-400 group-hover:animate-shake"
                        style="animation-delay: 0.05s">h</span>
                    <span
                        class="text-blue-500 transition-colors duration-200 group-hover:text-indigo-400 group-hover:animate-shake"
                        style="animation-delay: 0.1s">i</span>
                    <span
                        class="text-blue-500 transition-colors duration-200 group-hover:text-indigo-400 group-hover:animate-shake"
                        style="animation-delay: 0.15s">n</span>
                    <span
                        class="text-blue-500 transition-colors duration-200 group-hover:text-purple-400 group-hover:animate-shake"
                        style="animation-delay: 0.2s">c</span>
                    <span
                        class="text-white transition-colors duration-200 group-hover:text-pink-400 group-hover:animate-shake"
                        style="animation-delay: 0.25s">n</span>
                    <span
                        class="text-white transition-colors duration-200 group-hover:text-pink-400 group-hover:animate-shake"
                        style="animation-delay: 0.3s">e</span>
                    <span
                        class="text-white transition-colors duration-200 group-hover:text-blue-400 group-hover:animate-shake"
                        style="animation-delay: 0.35s">x</span>
                    <span
                        class="text-white transition-colors duration-200 group-hover:text-blue-400 group-hover:animate-shake"
                        style="animation-delay: 0.4s">t</span>
                </div>

                <span class="self-end text-[10px] font-bold text-slate-700 -mt-1 italic opacity-90">
                    create, creatively...
                </span>
            </div>

            <!-- Nav -->
            <nav class="relative z-10">
                <ul class="flex space-x-8 text-sm font-bold ">
                    <li><a href="#" class="hover:text-blue-500 transition-colors">Home</a></li>
                    <li><a href="#" class="hover:text-blue-500 transition-colors">About</a></li>
                    <li><a href="#" class="hover:text-blue-500 transition-colors">Services</a></li>
                    <li><a href="#" class="hover:text-blue-500 transition-colors">Career</a></li>
                    <li><a href="#" class="hover:text-blue-500 transition-colors">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <main class="container mx-auto px-4">
            <div class="text-center mt-32">
                <div data-aos="fade-left" data-aos-duration="1000">
                    <!-- Multi-color Animated Text -->
                    <h1 id="box" class="text-6xl font-bold leading-tight tracking-tight">
                        <span class="gradient-text animate-color-flow">Driving Digital Transformation</span><br>
                        <span class="font-light text-4xl">Through Full-Stack Technology Solutions</span>
                    </h1>
                </div>
                <div data-aos="fade-right" data-aos-duration="1000">
                    <p class="text-xl text-slate-700 mt-8 max-w-2xl mx-auto font-medium leading-relaxed">
                        Software Development <span class="text-blue-400">|</span> Web Applications <span
                            class="text-purple-400">|</span> Mobile <span class="text-pink-400">|</span> AI <span
                            class="text-blue-400">|</span> Cybersecurity
                    </p>
                </div>

                <!-- Animated Button -->
                <div data-aos="flip-right" data-aos-delay="400" data-aos-duration="1000" class="mt-12">
                    <button
                        class="relative group bg-blue-500 text-white font-bold py-4 px-10 rounded-2xl shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)] hover:-translate-y-1 transition-all duration-300 cursor-pointer overflow-hidden">
                        <span class="relative z-10">View Our Products</span>
                        <div
                            class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700">
                        </div>
                    </button>
                </div>
            </div>
        </main>
    </section>

    <div class=" py-10 border-y border-slate-100 w-full mt-10">

        <marquee behavior="scroll" direction="left" scrollamount="15" onmouseover="this.stop();"
            onmouseout="this.start();" class="flex items-center">
            <img src="web-dev.png" class="inline-block h-30 mx-12 ">

            <img src="app1.png" class="inline-block h-30 mx-12 ">

            <img src="ERP.png" class="inline-block h-30 mx-12 ">

            <img src="startups.png" class="inline-block h-30 mx-12 ">

            <img src="eCommerce.png" class="inline-block h-30 mx-12  ">

            <img src="cyber.png" class="inline-block h-30 mx-12 ">

            <img src="Domin.png" class="inline-block h-30 mx-12 ">

            <img src="Tik.png" class="inline-block h-30 mx-12  ">

            <img src="Gro.png" class="inline-block h-30 mx-12 ">

            <img src="taxi.png" class="inline-block h-30 mx-12 ">
        </marquee>

    </div>


    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 50
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="javascript.js"></script>

</body>

</html>
