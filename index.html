<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thincnext - Service Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-white text-blue-900 font-sans min-h-screen flex items-center justify-center p-6">

    <section class="w-full max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold text-blue-600 mb-8 border-b-2 border-blue-100 pb-4">Service Explorer</h2>
        
        <div class="flex flex-col md:flex-row gap-6 h-auto md:h-[500px]">
            <div id="buttons-container" class="w-full md:w-1/3 flex flex-col gap-3 overflow-y-auto pr-2">
                </div>

            <div class="w-full md:w-2/3 relative rounded-2xl overflow-hidden shadow-xl border border-blue-100 group flex-shrink-0">
                
                <div id="service-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-500 ease-in-out"></div>
                
                <div class="absolute inset-0 bg-blue-900/85 transition-colors duration-500"></div>

                <div class="relative z-10 p-10 h-full flex flex-col justify-center">
                    <h3 id="service-title" class="text-3xl font-bold text-white mb-4 transition-all duration-300">Select a Service</h3>
                    <p id="service-desc" class="text-white/90 text-lg leading-relaxed transition-all duration-300"></p>
                </div>

                <a href="service.html" class="absolute bottom-6 right-8 text-white font-medium hover:text-blue-200 underline tracking-wide z-20 transition-all">
                    more...
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
