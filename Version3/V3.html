<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext V3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="min-h-screen flex flex-col justify-end">
        <footer class="relative w-full overflow-hidden bg-gradient-to-b from-blue-500/50 via-white to-gray/60">

            <div class="pt-10 pb-10 px-10 md:px-20">
                <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-stretch gap-16">

                    <div class="flex flex-col space-y-12 min-w-[200px] py-2">

                        <div class="flex items-start">
                            <img src="./img/thincnextlogo1.png" alt="Company Logo" class="h-16 w-auto object-contain">
                        </div>

                        <div class="flex flex-col space-y-4">
                            <nav class="flex flex-col space-y-3 text-xl font-light text-gray-800">
                                <a href="#" class="hover:text-blue-600 transition-colors">Home</a>
                                <a href="#" class="hover:text-blue-600 transition-colors">About</a>
                                <a href="#" class="hover:text-blue-600 transition-colors">Services</a>
                                <a href="#" class="hover:text-blue-600 transition-colors">Careers</a>
                            </nav>

                            <div class="border-t border-gray-300 w-full my-4"></div>

                            <nav class="flex flex-col space-y-2 text-sm text-gray-500">
                                <a href="#" class="hover:text-black">Terms & Conditions</a>
                                <a href="#" class="hover:text-black">Policies</a>
                            </nav>
                        </div>

                    </div>

                    <div class="w-full max-w-md">
                        <div
                            class="bg-black/5 backdrop-blur-md border border-black/10 rounded-3xl p-8 shadow-xl text-black">
                            <h3 class="text-2xl font-semibold mb-6">Contact Us</h3>
                            <form class="space-y-4">
                                <input type="text" placeholder="Name"
                                    class="w-full bg-white/60 border border-black/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-500">
                                <input type="email" placeholder="Email"
                                    class="w-full bg-white/60 border border-black/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-500">
                                <textarea placeholder="Your Query" rows="4"
                                    class="w-full bg-white/60 border border-black/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-500 resize-none"></textarea>
                                <button
                                    class="w-full md:w-32 bg-black text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition-all">
                                    Send
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center items-center space-x-10 mt-16 text-3xl text-gray-700">
                    <a href="#" class="hover:text-blue-500 hover:scale-110 transition-all duration-300">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                    <a href="#" class="hover:text-pink-500 hover:scale-110 transition-all duration-300">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="hover:text-blue-400 hover:scale-110 transition-all duration-300">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                    <a href="#" class="hover:text-blue-600 hover:scale-110 transition-all duration-300">
                        <i class="fa-brands fa-facebook"></i>
                    </a>
                </div>
            </div>

            <div
                class="w-full bg-gradient-to-t from-gray-600/50 via-gray-600/40 to-white/60 backdrop-blur-sm py-8 border-t border-white/20">
                <div class="text-center text-gray-800 text-sm font-medium">
                    <p>&copy; Copyright 2026</p>
                </div>
            </div>

        </footer>
    </div>
</body>

</html>
