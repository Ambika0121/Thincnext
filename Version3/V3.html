<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext V3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<div class="min-h-screen flex flex-col justify-end bg-gray-50">
        
        <footer class="relative w-full text-white overflow-hidden">
            
            <div class="absolute inset-0 bg-gradient-to-b from-blue-600 via-white to-black -z-10 h-full"></div>

            <div class="bg-black/95 pt-20 pb-8 px-10 md:px-20">
                <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16">
                    
                    <div class="flex flex-col space-y-4 min-w-[150px]">
                        <nav class="flex flex-col space-y-3 text-xl font-light">
                            <a href="#" class="hover:text-blue-400">Home</a>
                            <a href="#" class="hover:text-blue-400">About</a>
                            <a href="#" class="hover:text-blue-400">Services</a>
                            <a href="#" class="hover:text-blue-400">Careers</a>
                        </nav>
                        
                        <div class="border-t border-gray-600 w-full my-4"></div>
                        
                        <nav class="flex flex-col space-y-2 text-sm text-gray-400">
                            <a href="#" class="hover:text-white">Term & Conditions</a>
                            <a href="#" class="hover:text-white">Policies</a>
                        </nav>
                    </div>

                    <div class="w-full max-w-md">
                        <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 shadow-2xl">
                            <h3 class="text-2xl font-semibold mb-6">Contact Us</h3>
                            <form class="space-y-4">
                                <input type="text" placeholder="Name" 
                                    class="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-400">
                                <input type="email" placeholder="Email" 
                                    class="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-400">
                                <textarea placeholder="Your Query" rows="4" 
                                    class="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 placeholder-gray-400"></textarea>
                                <button class="w-24 bg-white text-black font-bold py-2 rounded-lg hover:bg-blue-500 hover:text-white transition-all">
                                    Send
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center items-center space-x-10 mt-20 mb-10 text-3xl text-gray-300">
                    <a href="#" class="hover:text-blue-500"><i class="fa-solid fa-envelope"></i></a>
                    <a href="#" class="hover:text-pink-500"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="hover:text-blue-400"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="#" class="hover:text-blue-600"><i class="fa-brands fa-facebook"></i></a>
                </div>

                <div class="text-center text-gray-500 text-sm border-t border-gray-900 pt-8">
                    <p>&copy; Copyright 2026</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
