<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext V3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-end">

    <footer class="relative w-full text-white overflow-hidden">
        
        <div class="absolute inset-0 bg-gradient-to-b from-blue-600 to-white -z-10"></div>

        <div class="bg-black/90 pt-16 pb-6 px-8 md:px-16">
            <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
                
                <div class="flex flex-col space-y-4">
                    <nav class="flex flex-col space-y-2 text-lg">
                        <a href="#" class="hover:text-blue-400 transition">Home</a>
                        <a href="#" class="hover:text-blue-400 transition">About</a>
                        <a href="#" class="hover:text-blue-400 transition">Services</a>
                        <a href="#" class="hover:text-blue-400 transition">Careers</a>
                    </nav>
                    <div class="border-t border-gray-700 my-4 w-48"></div>
                    <nav class="flex flex-col space-y-2 text-sm text-gray-400">
                        <a href="#" class="hover:text-white">Term & Conditions</a>
                        <a href="#" class="hover:text-white">Policies</a>
                    </nav>
                </div>

                <div class="relative">
                    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-2xl">
                        <h3 class="text-2xl font-semibold mb-6">Contact Us</h3>
                        <form class="space-y-4">
                            <input type="text" placeholder="Name" 
                                class="w-full bg-white/10 border border-white/30 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-300">
                            <input type="email" placeholder="Email" 
                                class="w-full bg-white/10 border border-white/30 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-300">
                            <textarea placeholder="Your Query" rows="3" 
                                class="w-full bg-white/10 border border-white/30 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-300"></textarea>
                            <button class="bg-white text-black font-bold py-2 px-6 rounded-lg hover:bg-blue-100 transition duration-300">
                                Send
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="flex justify-center space-x-8 mt-12 mb-8 text-2xl">
                <a href="#" class="hover:text-blue-500 transition"><i class="fa-solid fa-envelope"></i></a>
                <a href="#" class="hover:text-pink-500 transition"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="hover:text-blue-400 transition"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" class="hover:text-blue-600 transition"><i class="fa-brands fa-facebook"></i></a>
            </div>

            <div class="text-center text-gray-500 text-sm border-t border-gray-800 pt-6">
                <p>&copy; Copyright 2026</p>
            </div>
        </div>
    </footer>
</body>
</html>
