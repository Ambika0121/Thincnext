<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext | Home</title>
     <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
   <style type="text/tailwindcss">
        @theme {
            --color-brand-blue: #1c8cc1;
        }

        /* Slide up for content */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Drifting animation for background blobs */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .animate-slide-up {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-blob {
            animation: blob 8s infinite ease-in-out;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-700 { animation-delay: 700ms; }
        .animation-delay-2000 { animation-delay: 2s; }
    </style>

    <style>
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .shine-border {
            position: relative;
        }

        /* This pseudo-element creates the animated border track */
        .shine-border::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px; /* Thickness of the shining line */
            
            /* The moving highlight gradient */
            background: linear-gradient(90deg, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 1) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% auto;
            animation: shine 4s linear infinite;
            
            /* Masking trick to hide the center and only show the border */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>  

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-blue/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute top-[20%] right-[-5%] w-[30rem] h-[30rem] bg-purple-300/40 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-80 h-80 bg-pink-300/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob" style="animation-delay: 4s;"></div>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-6xl flex justify-between items-center px-8 py-3 z-50 rounded-full 
                bg-white/30 backdrop-blur-xl border border-white/60 
                shadow-[0_8px_32px_rgba(0,0,0,0.1),inset_0_2px_4px_rgba(255,255,255,0.8),inset_0_10px_20px_rgba(255,255,255,0.4),inset_0_-10px_20px_rgba(0,0,0,0.05)]
                transition-all duration-300 hover:bg-white/40">
        
        <div class="flex-shrink-0 flex items-center">
            <img src="/img/thincnextlogo.png" alt="ThincNext Logo" class="h-12 md:h-14 w-auto object-contain drop-shadow-sm">
        </div>
        
        <ul class="hidden md:flex gap-8 list-none m-0 p-0">
            <li><a href="#home" class="text-gray-900 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Home</a></li>
            <li><a href="#about" class="text-gray-900 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">About</a></li>
            <li><a href="#services" class="text-gray-900 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Services</a></li>
            <li><a href="#career" class="text-gray-900 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Career</a></li>
            <li><a href="#contact" class="text-gray-900 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="min-h-screen flex items-center px-8 lg:px-24 pt-30 pb-16 relative z-10">
        
        <div class="max-w-3xl text-left animate-slide-up delay-100 
                    p-8 lg:p-14 rounded-[2rem] shine-border
                    bg-white/20 backdrop-blur-2xl border border-white/30
                    shadow-[0_15px_40px_rgba(0,0,0,0.1),inset_0_2px_10px_rgba(255,255,255,0.8),inset_0_-8px_20px_rgba(0,0,0,0.05)]">
            
            <h1 class="text-4xl lg:text-6xl font-bold leading-tight mb-6 animate-slide-up delay-300 text-gray-900 drop-shadow-sm tracking-tight">
                Empowering the <span class="text-brand-blue">Next</span><br/>Generation of Tech.
            </h1>
            
            <p class="text-base lg:text-lg text-gray-800 mb-10 max-w-xl animate-slide-up delay-500 drop-shadow-sm font-medium leading-relaxed">
                We build scalable, innovative solutions designed to transform your ideas into reality.
            </p>
            
            <div class="animate-slide-up delay-700">
                <a href="#about" class="inline-block px-8 py-3.5 rounded-full text-base font-bold text-gray-900 
                    bg-brand-blue/40 backdrop-blur-md border border-white/70
                    shadow-[0_10px_30px_rgba(0,0,0,0.1),inset_0_2px_4px_rgba(255,255,255,0.9),inset_0_12px_24px_rgba(255,255,255,0.6),inset_0_-12px_24px_rgba(0,0,0,0.05)]
                    hover:bg-white/60 hover:-translate-y-1 
                    hover:shadow-[0_15px_35px_rgba(0,0,0,0.15),inset_0_2px_4px_rgba(255,255,255,1),inset_0_12px_24px_rgba(255,255,255,0.8),inset_0_-12px_24px_rgba(0,0,0,0.05)]
                    transition-all duration-300">
                    Discover How
                </a>
            </div>
        </div>
    </section>

</body>
</html>
