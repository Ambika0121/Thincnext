<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThincNext | Home</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style type="text/tailwindcss">
        @theme {
            --color-brand-blue: #1c8cc1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>
</head>
<body>

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-blue/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute top-[20%] right-[-5%] w-72 h-72 bg-purple-300/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-6xl flex justify-between items-center px-6 z-20 rounded-full 
                bg-white/20 backdrop-blur-xl border border-white/60 
                shadow-[0_8px_32px_rgba(0,0,0,0.1),inset_0_2px_4px_rgba(255,255,255,0.8),inset_0_10px_20px_rgba(255,255,255,0.4),inset_0_-10px_20px_rgba(0,0,0,0.05)]
                transition-all duration-300 hover:bg-white/30">
        <div class="flex-shrink-0">
            <img src="/img/thincnextlogo.png" alt="ThincNext Logo" class="h-20 w-40 drop-shadow-sm">
        </div>
        <ul class="hidden md:flex gap-8 list-none m-0 p-0">
            <li><a href="#home" class="text-gray-800 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Home</a></li>
            <li><a href="#about" class="text-gray-800 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">About</a></li>
            <li><a href="#services" class="text-gray-800 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Services</a></li>
            <li><a href="#career" class="text-gray-800 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Career</a></li>
            <li><a href="#contact" class="text-gray-800 font-semibold hover:text-brand-blue transition-colors duration-300 drop-shadow-sm">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="h-screen flex items-center px-8 lg:px-24 relative z-10">
        <div class="max-w-3xl bg-blue-200 text-left">
            <h1 class="text-5xl lg:text-7xl font-bold leading-tight mb-6 animate-slide-up delay-100 text-gray-900 drop-shadow-sm">
                Empowering the <span class="text-brand-blue">Next</span> Generation of Tech.
            </h1>
            <p class="text-lg lg:text-xl text-gray-700 mb-10 max-w-2xl animate-slide-up delay-300 drop-shadow-sm">
                We build scalable, innovative solutions designed to transform your ideas into reality.
            </p>
            
            <div class="animate-slide-up delay-500">
                <a href="#about" class="inline-block px-10 py-4 rounded-full text-lg font-bold text-gray-800 
                    bg-white/30 backdrop-blur-md border border-white/60
                    shadow-[0_10px_30px_rgba(0,0,0,0.1),inset_0_2px_4px_rgba(255,255,255,0.9),inset_0_12px_24px_rgba(255,255,255,0.5),inset_0_-12px_24px_rgba(0,0,0,0.05)]
                    hover:bg-white/40 hover:-translate-y-1 
                    hover:shadow-[0_15px_35px_rgba(0,0,0,0.15),inset_0_2px_4px_rgba(255,255,255,1),inset_0_12px_24px_rgba(255,255,255,0.6),inset_0_-12px_24px_rgba(0,0,0,0.05)]
                    transition-all duration-300">
                    Discover How
                </a>
            </div>
        </div>
    </section>

</body>
</html>
